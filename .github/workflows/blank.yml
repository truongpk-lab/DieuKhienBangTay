name: ACV CI

on:
  push:
    branches:
      - main
      - update
  pull_request:
    branches:
      - main
      - update
  workflow_dispatch:

concurrency:
  group: acv-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  python:
    name: Python compile and profile validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python -m compileall backend actions core profiles DIEU_KHIEN_CHUOT run_desktop.py

      - name: Validate profile JSON files
        run: |
          python -c "from profiles.profile_manager import ProfileManager; manager = ProfileManager(); expected = ('office', 'entertainment', 'game_2d', 'custom'); [print(pid + ': ' + profile['name'] + ' (' + str(len(profile.get('functions', []))) + ' actions)') for pid in expected for profile in [manager.load_profile(pid)] if profile['id'] == pid and profile.get('functions')]"

  launcher-self-test:
    name: Launcher self-test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - frontend
      - python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libraries for OpenCV
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run launcher self-test
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
          ACV_UVICORN_LOG_LEVEL: warning
        run: python run_desktop.py --self-test
