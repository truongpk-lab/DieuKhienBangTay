name: CI

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI - React Vite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  python-ci:
    name: Python CI - Gesture Mouse Core
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DIEU_KHIEN_CHUOT

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies for OpenCV and GUI packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender1 \
            python3-tk

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall .

      - name: Check important files exist
        run: |
          test -f demo_run.py
          test -f desktop_app.py
          test -f hand_feature_utils.py
          test -f train_model.py
          test -f process_hand_gesture_dataset.py
          test -f collect_hand_gesture_data.py
